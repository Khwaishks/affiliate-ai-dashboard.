<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Influencer ROI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-slate-800">AffiliateTrack AI</h1>
            <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">Admin Portal</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Total Revenue</p>
                <p class="text-3xl font-bold">$12,840.00</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Active Influencers</p>
                <p class="text-3xl font-bold">24</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-sm">Avg. Conversion</p>
                <p class="text-3xl font-bold">3.2%</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-10">
            <h2 class="font-semibold mb-4">Sales Performance</h2>
            <canvas id="salesChart" height="100"></canvas>
        </div>

        <div class="bg-blue-900 text-white p-6 rounded-xl shadow-lg">
            <h2 class="flex items-center gap-2 font-semibold mb-2">✨ AI Growth Insights</h2>
            <p id="ai-text" class="text-blue-100 italic">"Influencer 'Alpha' shows a 40% spike in conversions on weekends. Recommend increasing commission by 2% for Saturday campaigns to maximize ROI."</p>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{ label: 'Revenue ($)', data: [1200, 1900, 1500, 2100, 1800, 2400, 2100], borderColor: '#2563eb', tension: 0.3 }]
            }
        });
    </script>
</body>
</html>
